name: Flinky
options:
  # XcodeGen options
  minimumXcodeGenVersion: 2.44.1
  lastUpgradeCheck: "1640"
  xcodeVersion: "16.4"
  # Project options
  bundleIdPrefix: com.techprimate
  deploymentTarget:
    iOS: "18.0"
  # Directory options
  createIntermediateGroups: true
  generateEmptyDirectories: false
  minimizedProjectReferenceProxies: true
  buildIndependentTargetsInParallel: true
  fileTypes:
    xcstrings: file
  groupOrdering: []
  defaultSourceDirectoryType: syncedFolder
  # Localization options
  useBaseInternationalization: false
  developmentLanguage: en

configs:
  Debug: debug
  Release: release

packages:
  SFSafeSymbols:
    url: https://github.com/SFSafeSymbols/SFSafeSymbols
    exactVersion: 7.0.0
  SentryCocoa:
    url: https://github.com/getsentry/sentry-cocoa.git
    exactVersion: 9.16.1
  OnLaunch:
    url: https://github.com/kula-app/OnLaunch-iOS-Client
    exactVersion: 0.0.6

targets:
  Flinky:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - type: syncedFolder
        path: Targets/App
    resources:
      - Targets/App/Sources/Resources
    info:
      path: Targets/App/Sources/Resources/Info.plist
      properties:
        CFBundleDisplayName: Flinky
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.productivity
        NFCReaderUsageDescription: "Share links with other NFC-capable devices by bringing them close together."
        NSPhotoLibraryAddUsageDescription: "Save your QRCode to your Photos"
        UIApplicationSceneManifest_Generation: true
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen_Generation: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations_iPad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
    entitlements:
      path: Targets/App/Sources/Resources/App.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.techprimate.Flinky
    dependencies:
      - target: FlinkyCore
      - target: ShareExtension
      - package: SFSafeSymbols
      - package: SentryCocoa
        product: SentrySPM
      - package: OnLaunch
    settings:
      base:
        PRODUCT_NAME: $(TARGET_NAME)
        PRODUCT_BUNDLE_IDENTIFIER: com.techprimate.Flinky
        CURRENT_PROJECT_VERSION: 8
        MARKETING_VERSION: 1.1.5
        DEVELOPMENT_TEAM: BZ362SQ6AB
        CODE_SIGN_STYLE: Manual
        ENABLE_PREVIEWS: true
        ENABLE_USER_SCRIPT_SANDBOXING: false
        GENERATE_INFOPLIST_FILE: true
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: true
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
      configurations:
        Debug:
          OTHER_SWIFT_FLAGS: ""
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ANALYTICS
          OTHER_SWIFT_FLAGS: ""
    preBuildScripts:
      - name: "Run Script - Generate Files"
        script: |
          set -e

          # Set up PATH for Homebrew tools
          if [[ "$(uname -m)" == arm64 ]]; then
              export PATH="/opt/homebrew/bin:$PATH"
          else
              export PATH="/usr/local/bin:$PATH"
          fi

          # Change to project directory
          cd "$SRCROOT"

          # Generate licenses
          ./Scripts/generate-licenses.sh

          # Generate version in settings
          ./Scripts/generate-version-in-settings.sh

          # Generate localization
          ./Scripts/generate-localization.sh

          echo "✅ All generation tasks completed successfully"
        inputFiles:
          - "$(SRCROOT)/Scripts/generate-licenses.sh"
          - "$(SRCROOT)/Scripts/generate-version-in-settings.sh"
          - "$(SRCROOT)/Scripts/generate-localization.sh"
          - "$(SRCROOT)/Sources/Resources/Localizable.xcstrings"
          - "$(SRCROOT)/Templates/en-strings.stencil"
          - "$(SRCROOT)/Templates/l21strings.stencil"
          - "$(SRCROOT)/Flinky.xcodeproj/project.pbxproj"
          - "$(SRCROOT)/Flinky.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved"
        outputFiles:
          - "$(SRCROOT)/Sources/Resources/Settings.bundle/Licenses.plist"
          - "$(SRCROOT)/Sources/Resources/Settings.bundle/Licenses.latest_result.txt"
          - "$(SRCROOT)/Sources/Resources/Settings.bundle/Root.plist"
          - "$(SRCROOT)/Sources/Utils/Localization.swift"
          - "$(SRCROOT)/Generated/generated-en.strings"
        shell: /bin/zsh
    postBuildScripts:
      - name: "Lint"
        basedOnDependencyAnalysis: false
        script: |
          if [[ "$(uname -m)" == arm64 ]]
          then
              export PATH="/opt/homebrew/bin:$PATH"
          fi

          if command -v swiftlint >/dev/null 2>&1
          then
              swiftlint
          else
              echo "warning: `swiftlint` command not found - See https://github.com/realm/SwiftLint#installation for installation instructions."
          fi
        runOnlyWhenInstalling: false
      - name: "Upload Debug Symbols to Sentry"
        basedOnDependencyAnalysis: false
        script: |
          # This script is responsible for uploading debug symbols and source context for Sentry.
          if [[ "$(uname -m)" == arm64 ]]; then
              export PATH="/opt/homebrew/bin:$PATH"
          fi

          if which sentry-cli >/dev/null; then
              export SENTRY_ORG=techprimate
              export SENTRY_PROJECT=flinky
              ERROR=$(sentry-cli debug-files upload --include-sources "$DWARF_DSYM_FOLDER_PATH" 2>&1 >/dev/null)
              if [ ! $? -eq 0 ]; then
                  echo "warning: sentry-cli - $ERROR"
              fi
          else
              echo "warning: sentry-cli not installed, download from https://github.com/getsentry/sentry-cli/releases"
          fi
        inputFiles:
          - "${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Resources/DWARF/${TARGET_NAME}"
        runOnlyWhenInstalling: false

  FlinkyCore:
    type: framework
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Targets/FlinkyCore/Sources
        excludes:
          - "**/*.xcstrings"
    resources:
      - Targets/FlinkyCore/Sources/Resources/Localizable.xcstrings
    dependencies:
      - package: SFSafeSymbols
    settings:
      base:
        PRODUCT_NAME: $(TARGET_NAME:c99extidentifier)
        PRODUCT_BUNDLE_IDENTIFIER: com.techprimate.Flinky.Core
        CURRENT_PROJECT_VERSION: 8
        MARKETING_VERSION: 1.1.5
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        PROVISIONING_PROFILE_SPECIFIER: ""
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: "1,2"
        BUILD_LIBRARY_FOR_DISTRIBUTION: false
        DYLIB_COMPATIBILITY_VERSION: 1
        DYLIB_CURRENT_VERSION: 1
        DYLIB_INSTALL_NAME_BASE: "@rpath"
        ENABLE_MODULE_VERIFIER: true
        ENABLE_USER_SCRIPT_SANDBOXING: false
        GENERATE_INFOPLIST_FILE: true
        INSTALL_PATH: "$(LOCAL_LIBRARY_DIR)/Frameworks"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        MODULE_VERIFIER_SUPPORTED_LANGUAGES: "objective-c objective-c++"
        MODULE_VERIFIER_SUPPORTED_LANGUAGE_STANDARDS: "gnu17 gnu++20"
        SKIP_INSTALL: true
        SWIFT_EMIT_LOC_STRINGS: true
        SWIFT_INSTALL_MODULE: true
        SWIFT_INSTALL_OBJC_HEADER: false
        VERSIONING_SYSTEM: apple-generic
        VERSION_INFO_PREFIX: ""
    preBuildScripts:
      - name: "Run Script - Generate Files"
        script: |
          set -e

          # Set up PATH for Homebrew tools
          if [[ "$(uname -m)" == arm64 ]]; then
              export PATH="/opt/homebrew/bin:$PATH"
          else
              export PATH="/usr/local/bin:$PATH"
          fi

          # Change to project directory
          cd "$SRCROOT"

          # Generate localization
          ./Scripts/generate-localization.sh

          echo "✅ All generation tasks completed successfully"
        shell: /bin/sh

  ShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Targets/ShareExtension/Sources
        excludes:
          - "**/*.xcstrings"
    resources:
      - Targets/ShareExtension/Sources/Resources/Localizable.xcstrings
    info:
      path: Targets/ShareExtension/Sources/Resources/Info.plist
      properties:
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
          NSExtensionMainStoryboard: MainInterface
          NSExtensionPointIdentifier: com.apple.share-services
    entitlements:
      path: Targets/ShareExtension/Sources/Resources/ShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.techprimate.Flinky
    dependencies:
      - target: FlinkyCore
      - package: SentryCocoa
        product: SentrySPM
    settings:
      base:
        PRODUCT_NAME: $(TARGET_NAME)
        PRODUCT_BUNDLE_IDENTIFIER: com.techprimate.Flinky.ShareExtension
        CURRENT_PROJECT_VERSION: 8
        MARKETING_VERSION: 1.1.5
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: Apple Development
        PROVISIONING_PROFILE_SPECIFIER: ""
        GENERATE_INFOPLIST_FILE: true
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        SKIP_INSTALL: true
        SWIFT_EMIT_LOC_STRINGS: true

  Tests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - Targets/Tests/Sources
    dependencies:
      - target: Flinky
      - target: FlinkyCore
      - package: SFSafeSymbols
    settings:
      base:
        PRODUCT_NAME: $(TARGET_NAME)
        PRODUCT_BUNDLE_IDENTIFIER: com.techprimate.Flinky.Tests
        CURRENT_PROJECT_VERSION: 8
        MARKETING_VERSION: 1.1.5
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Manual
        GENERATE_INFOPLIST_FILE: true
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        SWIFT_EMIT_LOC_STRINGS: false
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: "1,2"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Flinky.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Flinky"
        BUNDLE_LOADER: "$(TEST_HOST)"

  FlinkyCoreTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - Targets/FlinkyCoreTests/Sources
    dependencies:
      - target: Flinky
      - target: FlinkyCore
      - package: SFSafeSymbols
    settings:
      base:
        PRODUCT_NAME: $(TARGET_NAME)
        PRODUCT_BUNDLE_IDENTIFIER: com.techprimate.Flinky.CoreTests
        CURRENT_PROJECT_VERSION: 8
        MARKETING_VERSION: 1.1.5
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Manual
        GENERATE_INFOPLIST_FILE: true
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        SWIFT_EMIT_LOC_STRINGS: false
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: "1,2"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Flinky.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Flinky"
        BUNDLE_LOADER: "$(TEST_HOST)"

  ScreenshotUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - Targets/ScreenshotUITests/Sources
    dependencies:
      - target: Flinky
    settings:
      base:
        PRODUCT_NAME: $(TARGET_NAME)
        PRODUCT_BUNDLE_IDENTIFIER: com.techprimate.Flinky.ScreenshotUITests
        CURRENT_PROJECT_VERSION: 8
        MARKETING_VERSION: 1.1.5
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Manual
        GENERATE_INFOPLIST_FILE: true
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        SWIFT_EMIT_LOC_STRINGS: false
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: "1,2"
        TEST_TARGET_NAME: Flinky

  UITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.5"
    sources:
      - Targets/UITests/Sources
    dependencies:
      - target: Flinky
    settings:
      base:
        PRODUCT_NAME: $(TARGET_NAME)
        PRODUCT_BUNDLE_IDENTIFIER: com.techprimate.Flinky.UITests
        CURRENT_PROJECT_VERSION: 8
        MARKETING_VERSION: 1.1.5
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Manual
        GENERATE_INFOPLIST_FILE: true
        IPHONEOS_DEPLOYMENT_TARGET: "18.5"
        SWIFT_EMIT_LOC_STRINGS: false
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: "1,2"
        TEST_TARGET_NAME: Flinky

  ShareExtensionTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.5"
    sources:
      - Targets/ShareExtensionTests/Sources
    dependencies:
      - target: Flinky
    settings:
      base:
        PRODUCT_NAME: $(TARGET_NAME)
        PRODUCT_BUNDLE_IDENTIFIER: com.techprimate.Flinky.ShareExtensionTests
        CURRENT_PROJECT_VERSION: 8
        MARKETING_VERSION: 1.1.5
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Manual
        GENERATE_INFOPLIST_FILE: true
        IPHONEOS_DEPLOYMENT_TARGET: "18.5"
        SWIFT_EMIT_LOC_STRINGS: false
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: "1,2"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Flinky.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Flinky"
        BUNDLE_LOADER: "$(TEST_HOST)"

  ShareExtensionUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - Targets/ShareExtensionUITests/Sources
    dependencies:
      - target: Flinky
    settings:
      base:
        PRODUCT_NAME: $(TARGET_NAME)
        PRODUCT_BUNDLE_IDENTIFIER: com.techprimate.Flinky.ShareExtensionUITests
        CURRENT_PROJECT_VERSION: 8
        MARKETING_VERSION: 1.1.5
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Manual
        GENERATE_INFOPLIST_FILE: true
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        SWIFT_EMIT_LOC_STRINGS: false
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: "1,2"
        TEST_TARGET_NAME: Flinky

schemes:
  App:
    build:
      targets:
        Flinky: all
    run:
      config: Debug
    test:
      config: Debug
      testPlans:
        - path: Targets/ShareExtensionTests/Config/ShareExtensionTests.xctestplan
          defaultPlan: true
        - path: Targets/Tests/Config/Tests.xctestplan
        - path: Targets/FlinkyCoreTests/Config/FlinkyCoreTests.xctestplan
        - path: Targets/UITests/Config/UITests.xctestplan
        - path: Targets/ScreenshotUITests/Config/ScreenshotUITests.xctestplan
        - path: Targets/ShareExtensionUITests/Config/ShareExtensionUITests.xctestplan
      targets:
        - name: Tests
          parallelizable: true
        - name: FlinkyCoreTests
          parallelizable: true
        - name: ShareExtensionUITests
          parallelizable: true
        - name: UITests
          parallelizable: true
        - name: ShareExtensionTests
          parallelizable: true
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  FlinkyCore:
    build:
      targets:
        FlinkyCore: all
    run:
      config: Debug
    test:
      config: Debug
      testPlans:
        - path: Targets/FlinkyCoreTests/Config/FlinkyCoreTests.xctestplan
          defaultPlan: true
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  FlinkyCoreTests:
    build:
      targets:
        FlinkyCoreTests: [test]
    test:
      config: Debug
      testPlans:
        - path: Targets/FlinkyCoreTests/Config/FlinkyCoreTests.xctestplan
          defaultPlan: true
      targets:
        - name: FlinkyCoreTests
          parallelizable: true
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  ScreenshotUITests:
    build:
      targets:
        Flinky: all
        ScreenshotUITests: [test]
        ShareExtension: all
    run:
      config: Release
    test:
      config: Release
      testPlans:
        - path: Targets/ScreenshotUITests/Config/ScreenshotUITests.xctestplan
          defaultPlan: true
      targets:
        - name: ScreenshotUITests
    profile:
      config: Release
    analyze:
      config: Release
    archive:
      config: Release

  ShareExtension:
    build:
      targets:
        ShareExtension: all
        Flinky: all
    run:
      config: Debug
    test:
      config: Debug
      testPlans:
        - path: Targets/ShareExtensionTests/Config/ShareExtensionTests.xctestplan
          defaultPlan: true
        - path: Targets/ShareExtensionUITests/Config/ShareExtensionUITests.xctestplan
      targets:
        - name: ShareExtensionUITests
          parallelizable: true
        - name: UITests
          parallelizable: true
        - name: ShareExtensionTests
          parallelizable: true
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  ShareExtensionTests:
    build:
      targets:
        ShareExtensionTests: [test]
    test:
      config: Debug
      testPlans:
        - path: Targets/ShareExtensionTests/Config/ShareExtensionTests.xctestplan
          defaultPlan: true
      targets:
        - name: ShareExtensionTests
          parallelizable: true
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  ShareExtensionUITests:
    build:
      targets:
        ShareExtensionUITests: [test]
    test:
      config: Debug
      testPlans:
        - path: Targets/ShareExtensionUITests/Config/ShareExtensionUITests.xctestplan
          defaultPlan: true
      targets:
        - name: ShareExtensionUITests
          parallelizable: true
        - name: FlinkyCoreTests
          parallelizable: true
        - name: UITests
          parallelizable: true
        - name: ShareExtensionTests
          parallelizable: true
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  Tests:
    build:
      targets:
        Tests: [test]
    test:
      config: Debug
      testPlans:
        - path: Targets/Tests/Config/Tests.xctestplan
          defaultPlan: true
      targets:
        - name: Tests
          parallelizable: true
        - name: ShareExtensionTests
          parallelizable: true
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  UITests:
    build:
      targets:
        UITests: [test]
    test:
      config: Debug
      testPlans:
        - path: Targets/UITests/Config/UITests.xctestplan
          defaultPlan: true
      targets:
        - name: UITests
          parallelizable: true
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

settingGroups:
  base:
    ALWAYS_SEARCH_USER_PATHS: false
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: true
    CLANG_ANALYZER_NONNULL: true
    CLANG_ANALYZER_NUMBER_OBJECT_CONVERSION: YES_AGGRESSIVE
    CLANG_CXX_LANGUAGE_STANDARD: gnu++20
    CLANG_ENABLE_MODULES: true
    CLANG_ENABLE_OBJC_ARC: true
    CLANG_ENABLE_OBJC_WEAK: true
    CLANG_WARN_BLOCK_CAPTURE_AUTORELEASING: true
    CLANG_WARN_BOOL_CONVERSION: true
    CLANG_WARN_COMMA: true
    CLANG_WARN_CONSTANT_CONVERSION: true
    CLANG_WARN_DEPRECATED_OBJC_IMPLEMENTATIONS: true
    CLANG_WARN_DIRECT_OBJC_ISA_USAGE: YES_ERROR
    CLANG_WARN_DOCUMENTATION_COMMENTS: true
    CLANG_WARN_EMPTY_BODY: true
    CLANG_WARN_ENUM_CONVERSION: true
    CLANG_WARN_INFINITE_RECURSION: true
    CLANG_WARN_INT_CONVERSION: true
    CLANG_WARN_NON_LITERAL_NULL_CONVERSION: true
    CLANG_WARN_OBJC_IMPLICIT_RETAIN_SELF: true
    CLANG_WARN_OBJC_LITERAL_CONVERSION: true
    CLANG_WARN_OBJC_ROOT_CLASS: YES_ERROR
    CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: true
    CLANG_WARN_RANGE_LOOP_ANALYSIS: true
    CLANG_WARN_STRICT_PROTOTYPES: true
    CLANG_WARN_SUSPICIOUS_MOVE: true
    CLANG_WARN_UNGUARDED_AVAILABILITY: YES_AGGRESSIVE
    CLANG_WARN_UNREACHABLE_CODE: true
    CLANG_WARN__DUPLICATE_METHOD_MATCH: true
    COPY_PHASE_STRIP: false
    DEVELOPMENT_TEAM: BZ362SQ6AB
    ENABLE_STRICT_OBJC_MSGSEND: true
    ENABLE_USER_SCRIPT_SANDBOXING: true
    GCC_C_LANGUAGE_STANDARD: gnu17
    GCC_NO_COMMON_BLOCKS: true
    GCC_WARN_64_TO_32_BIT_CONVERSION: true
    GCC_WARN_ABOUT_RETURN_TYPE: YES_ERROR
    GCC_WARN_UNDECLARED_SELECTOR: true
    GCC_WARN_UNINITIALIZED_AUTOS: YES_AGGRESSIVE
    GCC_WARN_UNUSED_FUNCTION: true
    GCC_WARN_UNUSED_VARIABLE: true
    IPHONEOS_DEPLOYMENT_TARGET: "18.4"
    LOCALIZATION_PREFERS_STRING_CATALOGS: true
    MTL_FAST_MATH: true
    SDKROOT: iphoneos
    SWIFT_EMIT_LOC_STRINGS: true

settings:
  base: base
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf
      ENABLE_TESTABILITY: true
      GCC_DYNAMIC_NO_PIC: false
      GCC_OPTIMIZATION_LEVEL: 0
      GCC_PREPROCESSOR_DEFINITIONS:
        - DEBUG=1
        - $(inherited)
      MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
      ONLY_ACTIVE_ARCH: true
      SWIFT_ACTIVE_COMPILATION_CONDITIONS:
        - DEBUG
        - $(inherited)
      SWIFT_OPTIMIZATION_LEVEL: -Onone
    Release:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      ENABLE_NS_ASSERTIONS: false
      MTL_ENABLE_DEBUG_INFO: false
      SWIFT_COMPILATION_MODE: wholemodule
      VALIDATE_PRODUCT: true

fileGroups:
  - type: syncedFolder
    path: Config
    files:
      - .gitignore
      - .editorconfig
      - .swiftlint.yml
      - swiftgen.yml
      - Brewfile
      - Makefile
