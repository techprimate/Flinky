name: Screenshots

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  screenshots:
    name: Screenshots
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Install Dependencies
        run: brew bundle --file Brewfile-ci

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Wait for iOS Simulator
        uses: kula-app/wait-for-services-action/ios-simulator@v1.3.0
        with:
          device: iPhone 17 Pro
          boot: true
          warm-xcodebuild-settings: true
          project: Flinky.xcodeproj
          scheme: ScreenshotUITests

      - name: Capture and Upload Screenshots
        run: bundle exec fastlane generate_and_upload_screenshots_ci
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          LICENSE_PLIST_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Screenshots
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: screenshots
          path: fastlane/screenshots/
          retention-days: 7

      - name: Run CI Diagnostics
        if: failure()
        run: ./Scripts/ci-diagnostics.sh
